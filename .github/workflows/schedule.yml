name: Schedule Tests - PR

on:
  schedule:
    - cron: '30 10 * * 1-5'

jobs:
  RunTest:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o projeto
        uses: actions/checkout@v4


      - name: Instalar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v2


      - name: Instalar Chrome Driver
        uses: nanasess/setup-chromedriver@v2


      - name: Run Test
        run: mvn test -Dtest=RunCucumber  -Dbrowser=chrome-ci

      - name: Gerar relatório
        if: always()
        run: mvn cluecumber-report:reporting

      - name: Arquiva relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-tests
          path: '**/formated-report/'








