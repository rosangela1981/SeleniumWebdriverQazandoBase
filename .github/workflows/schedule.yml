name: Schedule Tests - PR

on:
  schedule:
    - cron: '08 15 * * 1-5'

jobs:
  RunTest:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o projeto
        uses: actions/checkout@v4


      - name: Instalar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v2


      - name: Instalar Chrome Driver
        uses: nanasess/setup-chromedriver@v2


      - name: Run Test
        run: mvn test -Dtest=RunCucumber  -Dbrowser=chrome-ci -Dcucumber.options="--tags ~@Ignore"

      - name: Gerar relatório
        if: always()
        run: mvn cluecumber-report:reporting

      - name: Arquiva relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-tests
          path: '**/formated-report/'


      - name: Enviar notificação Slack - Sucesso
        if: ${{ success() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: 'good' # Define explicitamente como verde
          SLACK_ICON: https://cdn-icons-png.flaticon.com/512/148/148767.png?size=48
          SLACK_MESSAGE: 'Sucesso na execução de teste Agendados :white_check_mark:'
          SLACK_TITLE: 'Sucesso na execução de teste Agendados  :white_check_mark: '
          SLACK_USERNAME: SUCESSO

      - name: Enviar notificação Slack - Falha
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: 'danger' # Define explicitamente como vermelho
          SLACK_ICON: https://cdn-icons-png.flaticon.com/512/148/148766.png # Opcional: ícone de erro
          SLACK_MESSAGE: 'Falha na execução de teste Agendados :fire:'
          SLACK_TITLE: 'Falha na execução de teste Agendados :fire:'
          SLACK_USERNAME: FALHA








